name: scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"
    - cron: "30 1-23/3 * * *"

permissions:
  contents: write

concurrency:
  group: yuming-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run historical scanner
        env:
          APICN_BASE_URL: ${{ secrets.APICN_BASE_URL }}
          APICN_TOKEN: ${{ secrets.APICN_TOKEN }}
          APICN_START_DATE: ${{ vars.APICN_START_DATE }}
          APICN_END_DATE: ${{ vars.APICN_END_DATE }}
        run: |
          if [ -z "${APICN_BASE_URL}" ] || [ -z "${APICN_TOKEN}" ]; then
            echo "::error::Missing APICN_BASE_URL or APICN_TOKEN repository secrets."
            exit 1
          fi

          python -u icp_query.py \
            --apicn-day-source \
            --limit 200000 \
            --target unregistered-with-icp \
            --delay 0.5 \
            --timeout 20 \
            --retries 1 \
            --max-runtime-seconds 3600 \
            --state-file apicn_scan_state.json \
            --matches-file apicn_scan_matches.json \
            -o latest_apicn_run_matches.json

      - name: Commit scan state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for file in apicn_scan_state.json apicn_scan_matches.json latest_apicn_run_matches.json; do
            if [ -e "$file" ]; then
              git add "$file"
            fi
          done
          if git diff --cached --quiet; then
            echo "No scan changes to commit."
          else
            git commit -m "Update scan state"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
